<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Access | Kaizaro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- EXACT DARK THEME CSS (Shared) --- */
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --input-bg: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 4px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .header p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 2px;
            font-size: 0.875rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background-color 0.2s;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .secure-badge {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .secure-icon {
            width: 8px; height: 8px;
            background-color: #10b981; /* Green for active */
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h1>Teacher Portal</h1>
            <p>Faculty Authentication</p>
        </div>
        
        <form>
            <div class="form-group">
                <label for="institute">Institute Name</label>
                <input type="text" id="institute" placeholder="e.g. Apex Academy" required>
            </div>
            
            <div class="form-group">
                <label for="teacher-code">Faculty Code</label>
                <input type="text" id="teacher-code" placeholder="EX: TCH-001" required>
            </div>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            
            <button type="submit" class="btn-submit">Access Dashboard</button>
        </form>

        <div class="secure-badge">
            <span class="secure-icon"></span>
            Secure Faculty Gateway
        </div>
    </div>

    <script src="setup-teacher.js"></script> 
</body>
</html>
